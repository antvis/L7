<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L7 多底图切换演示</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    
    #map {
      width: 100vw;
      height: 100vh;
    }
    
    .basemap-switcher {
      position: absolute;
      top: 20px;
      right: 20px;
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      z-index: 1000;
      min-width: 200px;
    }
    
    .basemap-switcher h3 {
      margin-bottom: 10px;
      font-size: 14px;
      color: #333;
    }
    
    .basemap-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .basemap-item {
      padding: 8px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 13px;
    }
    
    .basemap-item:hover {
      background: #f5f5f5;
      border-color: #1890ff;
    }
    
    .basemap-item.active {
      background: #e6f7ff;
      border-color: #1890ff;
      color: #1890ff;
      font-weight: 500;
    }
    
    .info-panel {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      z-index: 1000;
      max-width: 300px;
    }
    
    .info-panel h3 {
      margin-bottom: 8px;
      font-size: 14px;
      color: #333;
    }
    
    .info-panel p {
      font-size: 12px;
      color: #666;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  
  <div class="basemap-switcher">
    <h3>选择底图</h3>
    <div class="basemap-list" id="basemapList">
      <div class="basemap-item active" data-map="AMap">高德地图</div>
      <div class="basemap-item" data-map="BaiduMap">百度地图</div>
      <div class="basemap-item" data-map="TencentMap">腾讯地图</div>
      <div class="basemap-item" data-map="Mapbox">Mapbox</div>
      <div class="basemap-item" data-map="MapLibre">MapLibre</div>
    </div>
  </div>
  
  <div class="info-panel">
    <h3>多底图切换演示</h3>
    <p>点击右侧按钮切换不同的底图提供商。展示 L7 对不同地图服务的统一适配能力。</p>
  </div>

  <script type="module">
    import { PointLayer, Scene } from '@antv/l7';
    import * as Maps from '@antv/l7-maps';

    let currentScene = null;
    let currentMapType = 'AMap';

    // 示例数据 - 中国主要城市
    const cityData = {
      type: 'FeatureCollection',
      features: [
        {
          type: 'Feature',
          properties: { name: '上海', value: 100 },
          geometry: {
            type: 'Point',
            coordinates: [121.4737, 31.2304],
          },
        },
        {
          type: 'Feature',
          properties: { name: '北京', value: 95 },
          geometry: {
            type: 'Point',
            coordinates: [116.4074, 39.9042],
          },
        },
        {
          type: 'Feature',
          properties: { name: '广州', value: 85 },
          geometry: {
            type: 'Point',
            coordinates: [113.2644, 23.1291],
          },
        },
        {
          type: 'Feature',
          properties: { name: '深圳', value: 90 },
          geometry: {
            type: 'Point',
            coordinates: [114.0579, 22.5431],
          },
        },
        {
          type: 'Feature',
          properties: { name: '成都', value: 80 },
          geometry: {
            type: 'Point',
            coordinates: [104.0665, 30.5723],
          },
        },
        {
          type: 'Feature',
          properties: { name: '杭州', value: 88 },
          geometry: {
            type: 'Point',
            coordinates: [120.1551, 30.2741],
          },
        },
      ],
    };

    async function initScene(mapType) {
      // 销毁旧场景
      if (currentScene) {
        currentScene.destroy();
      }

      const isMapbox = ['Mapbox', 'MapLibre'].includes(mapType);
      const style = isMapbox
        ? 'https://basemaps.cartocdn.com/gl/positron-nolabels-gl-style/style.json'
        : 'light';

      const map = new Maps[mapType]({
        style,
        center: [121.434765, 31.256735],
        zoom: 10,
        pitch: 0,
        rotation: 0,
      });

      const scene = new Scene({
        id: 'map',
        map,
        logoVisible: false,
      });

      await new Promise((resolve) => {
        scene.on('loaded', resolve);
      });

      const layer = new PointLayer({ autoFit: true })
        .source(cityData)
        .shape('circle')
        .size('value', [15, 30])
        .color('#f00')
        .active(true)
        .style({
          opacity: 0.8,
          strokeWidth: 2,
          strokeColor: '#fff',
        });

      scene.addLayer(layer);
      currentScene = scene;
    }

    // 初始化场景
    await initScene(currentMapType);

    // 绑定切换事件
    const basemapItems = document.querySelectorAll('.basemap-item');
    basemapItems.forEach((item) => {
      item.addEventListener('click', async () => {
        const mapType = item.dataset.map;
        
        // 更新激活状态
        basemapItems.forEach((i) => i.classList.remove('active'));
        item.classList.add('active');
        
        // 重新初始化场景
        currentMapType = mapType;
        await initScene(mapType);
      });
    });
  </script>
</body>
</html>
